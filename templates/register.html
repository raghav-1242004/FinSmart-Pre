{% extends "base.html" %}
{% block title %}Register – SmartLoan AI{% endblock %}
{% block content %}
<style>
.auth-wrap { min-height: calc(100vh - 64px); display: flex; align-items: center; justify-content: center; padding: 2rem; }
.auth-card { width: 100%; max-width: 460px; padding: 2.5rem; border-radius: 20px; }
.auth-title { font-family:var(--font-head);font-size:1.8rem;font-weight:800;text-align:center;margin-bottom:0.3rem; }
.auth-sub { text-align:center;color:var(--text-muted);font-size:0.875rem;margin-bottom:2rem; }
.brand-icon2 { width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:inline-grid;place-items:center;font-size:1.5rem;color:#fff;margin-bottom:0.75rem; }
.strength-bar { height:4px;border-radius:2px;background:var(--surface2);margin-top:0.4rem;overflow:hidden; }
.strength-fill { height:100%;border-radius:2px;transition:width 0.4s,background 0.4s; }
</style>
<div class="auth-wrap">
  <div class="glass auth-card">
    <div style="text-align:center;margin-bottom:2rem;">
      <div class="brand-icon2"><i class="fa fa-brain"></i></div>
      <div class="auth-title">Create Account</div>
      <div class="auth-sub">Join SmartLoan AI today</div>
    </div>
    <div id="errMsg" style="display:none;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);border-radius:10px;padding:0.75rem 1rem;font-size:0.875rem;color:var(--red);margin-bottom:1rem;"></div>
    <div class="form-group">
      <label class="form-label">Username</label>
      <input type="text" class="form-control-smart" id="username" placeholder="Choose a username"/>
    </div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-control-smart" id="email" placeholder="your@email.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" class="form-control-smart" id="password" placeholder="Min 6 characters" oninput="checkStrength()"/>
      <div class="strength-bar"><div class="strength-fill" id="strengthBar" style="width:0%"></div></div>
      <div style="font-size:0.73rem;color:var(--text-muted);margin-top:0.25rem;" id="strengthLabel"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input type="password" class="form-control-smart" id="confirm" placeholder="Repeat password"/>
    </div>
    <button class="btn-primary-smart w-100 justify-content-center" style="margin-top:0.5rem;padding:0.85rem;" onclick="doRegister()" id="regBtn">
      <i class="fa fa-user-plus"></i> Create Account
    </button>
    <div style="text-align:center;margin-top:1.2rem;font-size:0.875rem;color:var(--text-muted);">
      Already have an account? <a href="{{ url_for('login') }}" style="color:var(--accent);">Sign in</a>
    </div>
  </div>
</div>
<script>
function checkStrength() {
  const p = document.getElementById('password').value;
  const bar = document.getElementById('strengthBar');
  const lbl = document.getElementById('strengthLabel');
  let score = 0;
  if (p.length >= 6) score++;
  if (p.length >= 10) score++;
  if (/[A-Z]/.test(p)) score++;
  if (/[0-9]/.test(p)) score++;
  if (/[^A-Za-z0-9]/.test(p)) score++;
  const levels = ['','Weak','Fair','Good','Strong','Very Strong'];
  const colors = ['','#ef4444','#f59e0b','#eab308','#10b981','#06b6d4'];
  bar.style.width = (score * 20) + '%';
  bar.style.background = colors[score] || '';
  lbl.textContent = levels[score] || '';
}
async function doRegister() {
  const btn = document.getElementById('regBtn');
  const err = document.getElementById('errMsg');
  const pwd = document.getElementById('password').value;
  const con = document.getElementById('confirm').value;
  if (pwd !== con) { err.textContent='Passwords do not match'; err.style.display='block'; return; }
  if (pwd.length < 6) { err.textContent='Password must be at least 6 characters'; err.style.display='block'; return; }
  btn.innerHTML = '<i class="fa fa-spinner fa-spin"></i> Creating…'; btn.disabled = true;
  const res = await fetch('/register', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username:document.getElementById('username').value, email:document.getElementById('email').value, password:pwd})
  });
  const data = await res.json();
  if (data.success) { window.location.href='/dashboard'; }
  else { err.textContent=data.message; err.style.display='block'; btn.innerHTML='<i class="fa fa-user-plus"></i> Create Account'; btn.disabled=false; }
}
</script>
{% endblock %}
